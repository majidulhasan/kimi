<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f3d2e" />
    <meta name="description" content="Your premier destination for modest fashion - Abayas, Hijabs, Dresses & Accessories" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Al-Falah" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <title>Al-Falah Boutique</title>
    <style>
      /* Critical CSS for initial load */
      html, body { margin: 0; padding: 0; }
      #root { min-height: 100vh; }
      .loading-screen {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0f3d2e 0%, #1a5f4a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen" id="initial-loader">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove initial loader when app loads
      window.addEventListener('load', function() {
        const loader = document.getElementById('initial-loader');
        if (loader) loader.remove();
      });
    </script>
  </body>
</html>
